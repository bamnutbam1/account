<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" fill="#1a1612"/>

  <!-- Subtle warm glow top-right -->
  <circle cx="380" cy="130" r="180" fill="#e8641a" opacity="0.10"/>

  <!-- Pan handle - left side -->
  <rect x="42" y="248" width="90" height="20" rx="10" fill="#e8641a"/>

  <!-- Pan body (circle/ellipse) -->
  <circle cx="280" cy="258" r="155" fill="#221e19"/>
  <circle cx="280" cy="258" r="155" fill="none" stroke="#e8641a" stroke-width="14"/>

  <!-- Steam lines -->
  <path d="M200 145 Q192 120 200 95" fill="none" stroke="#ff9955" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M255 130 Q247 105 255 80" fill="none" stroke="#ff9955" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M310 145 Q302 120 310 95" fill="none" stroke="#ff9955" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

  <!-- Egg white -->
  <ellipse cx="248" cy="272" rx="95" ry="72" fill="#f5ede0"/>

  <!-- Egg yolk -->
  <circle cx="245" cy="268" r="46" fill="#e8641a"/>
  <circle cx="245" cy="268" r="46" fill="none" stroke="#d4881a" stroke-width="3"/>
  <!-- Yolk highlight -->
  <circle cx="228" cy="252" r="14" fill="#ff9955" opacity="0.5"/>
</svg>